<script>
(function() {
    const about = document.getElementById('about-section');
    
    if (about) {
        // 1. Resetando o estado e preparando para a animação
        about.style.display = 'block';
        about.style.opacity = '0';
        about.style.transform = 'translateY(30px) scale(0.98)';
        about.style.filter = 'blur(10px)';
        about.style.transition = 'all 0.8s cubic-bezier(0.16, 1, 0.3, 1)';
        about.style.borderLeft = '0px solid #000'; // Efeito de borda crescendo

        // 2. Criando o efeito de "Glitch de Surgimento"
        setTimeout(() => {
            about.style.opacity = '1';
            about.style.transform = 'translateY(0) scale(1)';
            about.style.filter = 'blur(0px)';
            about.style.borderLeft = '8px solid #000'; // A borda "brota" na lateral
            
            // 3. Efeito de "Flash" rápido para simular carregamento de sistema
            about.style.backgroundColor = 'rgba(255, 255, 255, 0.2)';
            setTimeout(() => {
                about.style.backgroundColor = 'var(--bg-card)'; 
            }, 150);
            
            console.log(" Janela 'Como eu Trabalho'");
        }, 100);
    }
})();
  </script>
