<script>
(function() {
    // 1. Identificação dos elementos originais
    const overlay = document.getElementById('project-prompt-overlay');
    if (!overlay) return;

    // 2. CSS Temporário (com IDs únicos para limpeza fácil)
    const styleId = 'aet-animation-runtime-styles';
    let styleTag = document.getElementById(styleId);
    if (!styleTag) {
        styleTag = document.createElement('style');
        styleTag.id = styleId;
        document.head.appendChild(styleTag);
    }
    
    styleTag.textContent = `
        #project-prompt-overlay { display: flex !important; opacity: 1 !important; background: rgba(0,0,0,0.98) !important; z-index: 10000 !important; overflow: hidden; }
        .project-prompt-card { display: none !important; }

        .aet-physics-container { position: absolute; inset: 0; pointer-events: none; }
        
        .aet-ball {
            position: absolute; width: 35px; height: 35px; background: #000;
            border: 2px solid #fff; border-radius: 50%; left: 0; top: 0; z-index: 10001;
        }

        .aet-ink-splatter {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            width: 700px; height: 700px; fill: #000; transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 9999;
        }
        .aet-ink-splatter.active { transform: translate(-50%, -50%) scale(1.6); }

        .aet-revelation {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: min(450px, 85vw); text-align: center; color: #fff; opacity: 0; 
            transition: opacity 0.4s ease; z-index: 10002; pointer-events: none;
        }
        .aet-revelation.active { opacity: 1; pointer-events: auto; }
        .aet-revelation h2 { font-size: 22px; text-transform: uppercase; margin-bottom: 12px; letter-spacing: 2px; }
        .aet-revelation p { font-size: 15px; line-height: 1.6; margin-bottom: 25px; color: #ddd; }
        
        .aet-btn-confirm {
            background: #fff; color: #000; border: none; padding: 12px 35px; 
            font-weight: 900; cursor: pointer; text-transform: uppercase;
            box-shadow: 4px 4px 0 #666; transition: 0.1s;
        }
        .aet-btn-confirm:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0 #666; }

        .aet-flying-dot {
            position: fixed; width: 5px; height: 5px; background: #fff;
            border-radius: 50%; z-index: 11000; pointer-events: none; transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .j-data-block {
            margin-top: 15px; border: 1px solid #000; background: #f0f0f0; padding: 10px;
            font-family: monospace; font-size: 11px; color: #000; box-shadow: 3px 3px 0 #000;
            animation: aet-pop 0.3s ease-out forwards;
        }
        @keyframes aet-pop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    `;

    // 3. Montagem do Palco
    const container = document.createElement('div');
    container.className = 'aet-physics-container';
    overlay.appendChild(container);

    const ball = document.createElement('div');
    ball.className = 'aet-ball';
    container.appendChild(ball);

    const splatter = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    splatter.setAttribute("viewBox", "0 0 100 100");
    splatter.setAttribute("class", "aet-ink-splatter");
    splatter.innerHTML = `<path d="M50,5 Q70,5 85,25 T95,50 T80,85 T50,95 T15,80 T5,50 T20,10 Z" />`;
    overlay.appendChild(splatter);

    const content = document.createElement('div');
    content.className = 'aet-revelation';
    content.innerHTML = `
        <h2>Eficiência e Autonomia</h2>
        <p>Projetos estruturados para custo zero de manutenção. Arquitetura serverless que elimina taxas fixas e garante independência técnica total.</p>
        <button class="aet-btn-confirm">OK</button>
    `;
    overlay.appendChild(content);

    // 4. Lógica de Física (Queda e Quique)
    let px = 20, py = 20;
    let vx = 5, vy = 0;
    let gravity = 0.6;
    let bounce = 0.65;
    let isActive = true;

    function step() {
        if (!isActive) return;

        vy += gravity;
        px += vx;
        py += vy;

        const ground = window.innerHeight - 40;
        const wall = window.innerWidth - 40;

        if (py >= ground) {
            py = ground;
            vy *= -bounce;
            vx *= 0.95; 
        }
        if (px >= wall || px <= 0) vx *= -1;

        ball.style.transform = `translate(${px}px, ${py}px)`;

        // Explosão quando a energia de quique acaba no centro aproximado
        if (Math.abs(vy) < 1 && py > ground - 5) {
            startExplosion();
        } else {
            requestAnimationFrame(step);
        }
    }

    function startExplosion() {
        isActive = false;
        ball.style.opacity = '0';
        splatter.classList.add('active');
        setTimeout(() => content.classList.add('active'), 300);
    }

    // 5. Finalização e Limpeza do Fundo
    content.querySelector('.aet-btn-confirm').onclick = function() {
        // Inicia recolhimento visual
        content.classList.remove('active');
        splatter.style.transform = 'translate(-50%, -50%) scale(0)';
        splatter.style.opacity = '0';

        // Dispara partículas para os cards
        const cards = document.querySelectorAll('.card');
        cards.forEach((card) => {
            const dot = document.createElement('div');
            dot.className = 'aet-flying-dot';
            dot.style.left = '50%';
            dot.style.top = '50%';
            document.body.appendChild(dot);

            const rect = card.getBoundingClientRect();
            
            requestAnimationFrame(() => {
                dot.style.left = (rect.left + rect.width / 2) + 'px';
                dot.style.top = (rect.top + rect.height / 2) + 'px';
                dot.style.opacity = '0';
            });

            setTimeout(() => {
                dot.remove();
                injectCardData(card);
            }, 1000);
        });

        // LIMPEZA CRÍTICA: Remove o fundo preto e os estilos injetados
        setTimeout(() => {
            overlay.style.setProperty('display', 'none', 'important'); // Esconde o overlay
            styleTag.remove(); // Remove o CSS que forçava o display flex
            container.remove();
            splatter.remove();
            content.remove();
            
            // Se houver uma função de fechar nativa no seu index, chamamos ela
            if(typeof closeProjectPrompt === 'function') closeProjectPrompt();
        }, 800);
    };

    function injectCardData(card) {
        if (card.querySelector('.j-data-block')) return;
        const div = document.createElement('div');
        div.className = 'j-data-block';
        div.innerHTML = `<strong>STATUS:</strong> CUSTO ZERO<br><strong>MANUTENÇÃO:</strong> R$ 0,00<br><strong>HOST:</strong> SERVERLESS`;
        const actions = card.querySelector('.actions');
        if (actions) card.insertBefore(div, actions);
        else card.appendChild(div);
    }

    // Início da execução
    requestAnimationFrame(step);

})();
</script>
