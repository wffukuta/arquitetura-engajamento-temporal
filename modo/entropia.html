<script>
(function() {
   
    const css = `
        :root {
            --bg-body: #050505;
            --bg-card: #000000;
            --border-color: #00ff41; 
            --text-main: #00ff41;
            --text-muted: #003300;
            --link-color: #00ff41;
        }
        body {
            background-image: linear-gradient(rgba(0, 255, 65, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 255, 65, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        .card {
            box-shadow: 4px 4px 0px #003300 !important;
            border: 1px solid #00ff41 !important;
        }
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 9999;
            pointer-events: none;
            background-size: 100% 4px, 3px 100%;
            opacity: 0.3;
        }
    `;

    const styleTag = document.createElement('style');
    // Usando um dos IDs que o seu index.html já sabe limpar no 'clearModoScripts'
    styleTag.id = 'cyberpunk-theme-overrides'; 
    styleTag.textContent = css;
    document.head.appendChild(styleTag);

    console.log("🧬 Modo Entropia: CSS e Lógica injetados com sucesso.");

    // 2. Lógica de Interação Temporal
    const cards = document.querySelectorAll('.card');
    let intensidade = 0;

    const loopEntropico = setInterval(() => {
        intensidade += 0.05;
        cards.forEach(card => {
            const x = (Math.random() - 0.5) * intensidade;
            const y = (Math.random() - 0.5) * intensidade;
            card.style.transform = `translate(${x}px, ${y}px)`;
        });
        if (intensidade > 4) intensidade = 0;
    }, 100);

    // Limpeza automática ao trocar de modo
    window.addEventListener('modo:all-sources-completed', () => {
        clearInterval(loopEntropico);
        styleTag.remove();
    }, { once: true });

})();
</script>
