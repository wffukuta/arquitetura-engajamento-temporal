<script>
(function() {
    const css = `
        :root {
            --bg-body: #f4f1ea; /* Cor de papel antigo */
            --bg-card: #ffffff;
            --border-color: #2f2f2f;
            --text-main: #1a1a1a;
            --text-muted: #555555;
            --link-color: #000000;
        }
        body {
            background-image: none !important;
            filter: sepia(0.2);
            transition: all 2s ease-in-out;
        }
        header {
            background-color: #f4f1ea !important;
            border-bottom: 1px solid #2f2f2f !important;
        }
        #mesh-bg { display: none !important; }
        .card {
            box-shadow: none !important;
            border: 1px solid #d1d1d1 !important;
            border-bottom: 3px solid #2f2f2f !important;
        }
        h1, h2 { font-family: 'serif' !important; text-transform: none !important; }
    `;

    const styleTag = document.createElement('style');
    styleTag.id = 'kindle-theme-overrides'; // Já está no seu clearModoScripts
    styleTag.textContent = css;
    document.head.appendChild(styleTag);

    console.log("📖 Modo Foco: Priorizando a leitura e reflexão.");

    // Desativa temporariamente o movimento do mesh para poupar processamento
    const mesh = document.getElementById('mesh-bg');
    if(mesh) mesh.style.display = 'none';

    window.addEventListener('modo:all-sources-completed', () => {
        styleTag.remove();
        if(mesh) mesh.style.display = 'block';
    }, { once: true });
})();
</script>
