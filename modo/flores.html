<script>
(function() {
    const header = document.querySelector('header');
    const heroContent = document.querySelector('.hero-content');
    const h1 = header.querySelector('h1');
    if (!header || !heroContent || !h1) return;

    // 1. Configuração de Camadas Simples
    header.style.position = 'relative';
    
    // Texto na frente de tudo
    heroContent.style.position = 'relative';
    heroContent.style.zIndex = '10';
    h1.style.textShadow = 'none'; // Garante que não haja sombra

    // Canvas no meio (atrás do texto, na frente do fundo)
    const canvas = document.createElement('canvas');
    Object.assign(canvas.style, {
        position: 'absolute',
        top: '0',
        left: '0',
        width: '100%',
        height: '100%',
        zIndex: '5',
        pointerEvents: 'none'
    });
    header.appendChild(canvas);

    const ctx = canvas.getContext('2d', { alpha: true });
    let flowers = [];
    const colors = ['#58a6ff', '#7b5cff', '#20c997'];
    const DURATION_MS = 20000; 
    let startTime = Date.now();

    function setupCanvas() {
        canvas.width = header.offsetWidth;
        canvas.height = header.offsetHeight;
    }

    class Flower {
        constructor() {
            // Garante espalhamento por toda a largura do canvas
            this.x = Math.random() * canvas.width;
            this.maxH = Math.random() * 40 + 30;
            this.delay = Math.random() * (DURATION_MS * 0.7);
            this.color = colors[Math.floor(Math.random() * colors.length)];
            this.petals = Math.floor(Math.random() * 2) + 5;
            this.angle = (Math.random() - 0.5) * 0.5;
        }

        draw() {
            const elapsed = Date.now() - (startTime + this.delay);
            if (elapsed < 0) return;

            const p = Math.min(1, elapsed / 4000); // 4 segundos para cada flor crescer
            const h = this.maxH * p;

            ctx.save();
            ctx.translate(this.x, canvas.height);
            
            // Caule
            ctx.beginPath();
            ctx.strokeStyle = '#20c997';
            ctx.lineWidth = 2;
            ctx.moveTo(0, 0);
            ctx.lineTo(h * this.angle, -h);
            ctx.stroke();

            // Flor
            if (p > 0.3) {
                const s = (p - 0.3) * 12;
                ctx.translate(h * this.angle, -h);
                ctx.fillStyle = this.color;
                for (let i = 0; i < this.petals; i++) {
                    ctx.rotate((Math.PI * 2) / this.petals);
                    ctx.beginPath();
                    ctx.arc(s, 0, s/2, 0, Math.PI * 2);
                    ctx.fill();
                }
                // Miolo
                ctx.beginPath();
                ctx.fillStyle = '#fff';
                ctx.arc(0, 0, s/3, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }
    }

    function init() {
        setupCanvas();
        flowers = [];
        // Criamos 50 flores espalhadas
        for (let i = 0; i < 50; i++) {
            flowers.push(new Flower());
        }
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        flowers.forEach(f => f.draw());
        requestAnimationFrame(animate);
    }

    // Aguarda um momento para o navegador calcular o tamanho real do header
    window.addEventListener('resize', setupCanvas);
    setTimeout(() => {
        init();
        animate();
    }, 100);

})();
</script>
