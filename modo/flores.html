<script>
(function() {
    const header = document.querySelector('header');
    const heroContent = document.querySelector('.hero-content');
    const h1 = header ? header.querySelector('h1') : null;
    if (!header || !heroContent || !h1) return;

    header.style.position = 'relative';
    heroContent.style.position = 'relative';
    heroContent.style.zIndex = '10';

    const canvas = document.createElement('canvas');
    Object.assign(canvas.style, {
        position: 'absolute',
        top: '0',
        left: '0',
        width: '100%',
        height: '100%',
        zIndex: '5',
        pointerEvents: 'none'
    });
    header.appendChild(canvas);

    const ctx = canvas.getContext('2d', { alpha: true });
    let flowers = [];
    let seeds = [];
    const DURATION_MS = 20000; 
    let startTime = Date.now();
    const bloomSound = new Audio('./assets/floresnascendo.mp3');
    bloomSound.preload = 'auto';
    let animationStarted = false;
    let releaseTriggered = false;
    let releaseStartTime = 0;

    function startAnimation() {
        if (animationStarted) return;
        animationStarted = true;
        startTime = Date.now();
        playBloomSound();
    }

    function playBloomSound() {
        bloomSound.currentTime = 0;
        bloomSound.play();

        setTimeout(() => {
            bloomSound.pause();
            bloomSound.currentTime = 0;
        }, DURATION_MS);
    }

    function setupCanvas() {
        canvas.width = header.offsetWidth;
        canvas.height = header.offsetHeight;
    }

    class Flower {
        constructor() {
            this.x = Math.random() * canvas.width;
            
            // Lógica de Altura Dinâmica:
            // Calcula a distância do centro (0 a 1)
            const centerX = canvas.width / 2;
            const distFromCenter = Math.abs(this.x - centerX) / centerX;
            
            if (distFromCenter < 0.25) {
                // No centro: Flores anãs (para não cobrir o nome)
                this.maxH = Math.random() * 15 + 10; 
            } else {
                // Nas bordas: Flores crescem progressivamente mais
                this.maxH = (distFromCenter * 60) + (Math.random() * 20);
            }

            this.delay = Math.random() * (DURATION_MS * 0.7);
            this.color = '#000000'; // Cor preta solicitada
            this.petals = Math.floor(Math.random() * 2) + 5;
            this.angle = (Math.random() - 0.5) * 0.4;
        }

        draw() {
            const elapsed = Date.now() - (startTime + this.delay);
            if (elapsed < 0) return;

            const p = Math.min(1, elapsed / 4000); 
            const h = this.maxH * p;

            ctx.save();
            ctx.translate(this.x, canvas.height);
            
            // Caule Preto
            ctx.beginPath();
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 1.5;
            ctx.moveTo(0, 0);
            ctx.lineTo(h * this.angle, -h);
            ctx.stroke();

            // Flor
            if (p > 0.3) {
                const s = (p - 0.3) * 10;
                ctx.translate(h * this.angle, -h);
                ctx.fillStyle = this.color;
                
                // Pétalas
                for (let i = 0; i < this.petals; i++) {
                    ctx.rotate((Math.PI * 2) / this.petals);
                    ctx.beginPath();
                    ctx.arc(s, 0, s/2, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // Miolo (Branco para destacar no preto)
                ctx.beginPath();
                ctx.fillStyle = '#ffffff';
                ctx.arc(0, 0, s/4, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }
    }

    class Seed {
        constructor(index, total) {
            const spread = canvas.width * 0.8;
            const startX = (canvas.width - spread) / 2;
            this.x = startX + (index / Math.max(1, total - 1)) * spread + (Math.random() - 0.5) * 12;
            this.y = -Math.random() * canvas.height * 0.7;
            this.targetY = canvas.height - (Math.random() * 8 + 3);
            this.vy = Math.random() * 0.5 + 1.6;
            this.radius = Math.random() * 2 + 2;
            this.pulseOffset = Math.random() * Math.PI * 2;
            this.shakeOffset = Math.random() * Math.PI * 2;
        }

        update(now) {
            if (this.y < this.targetY) {
                this.y += this.vy;
                if (this.y > this.targetY) this.y = this.targetY;
            }

            const pulse = 1 + Math.sin(now / 250 + this.pulseOffset) * 0.16;
            const shake = Math.sin(now / 130 + this.shakeOffset) * 0.7;
            let shrink = 1;

            if (releaseTriggered) {
                const t = Math.min(1, (now - releaseStartTime) / 1200);
                shrink = 1 - t;
            }

            return {
                drawX: this.x + shake,
                drawY: this.y,
                drawRadius: Math.max(0, this.radius * pulse * shrink)
            };
        }
    }

    function init() {
        setupCanvas();
        flowers = [];
        for (let i = 0; i < 80; i++) {
            flowers.push(new Flower());
        }

        seeds = [];
        for (let i = 0; i < 95; i++) {
            seeds.push(new Seed(i, 95));
        }
        releaseTriggered = false;
        releaseStartTime = 0;
        animationStarted = false;
    }

    function triggerRelease() {
        if (releaseTriggered) return;
        releaseTriggered = true;
        releaseStartTime = Date.now();
        startAnimation();
    }

    function animate() {
        const now = Date.now();
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        let visibleSeeds = 0;
        let landedSeeds = 0;
        seeds.forEach(seed => {
            const state = seed.update(now);
            if (seed.y >= seed.targetY) {
                landedSeeds += 1;
            }
            if (state.drawRadius <= 0) return;
            visibleSeeds += 1;
            ctx.beginPath();
            ctx.lineWidth = 1;
            ctx.strokeStyle = '#ffffff';
            ctx.fillStyle = '#000000';
            ctx.arc(state.drawX, state.drawY, state.drawRadius, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
        });

        if (!releaseTriggered && landedSeeds === seeds.length) {
            triggerRelease();
        }

        if (animationStarted) {
            flowers.forEach(f => f.draw());
        }

        if (releaseTriggered && visibleSeeds === 0 && !animationStarted) {
            startAnimation();
        }

        requestAnimationFrame(animate);
    }

    window.addEventListener('resize', () => {
        init();
    });

    init();
    animate();

})();
</script>
