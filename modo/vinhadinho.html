<script>
  (function() {
    // 1. Esconde o Canvas de fundo (Mesh Gradient)
    const canvas = document.getElementById('mesh-bg');
    if (canvas) canvas.style.display = 'none';

    // 2. Configura as variáveis base de "Papel Eletrônico"
    const root = document.documentElement;
    root.style.setProperty('--bg-body', '#f0f0f0'); // Fundo cinza claro papel
    root.style.setProperty('--bg-card', '#ffffff'); // Fundo dos cards branco
    root.style.setProperty('--text-main', '#1a1a1a'); // Texto "tinta" preta
    root.style.setProperty('--text-muted', '#4d4d4d');
    root.style.setProperty('--link-color', '#003366'); // Azul marinho para links

    // 3. Injeta o CSS de estilo "Sketch / Kindle Color"
    const styleId = 'kindle-theme-overrides';
    let styleTag = document.getElementById(styleId);
    
    if (!styleTag) {
      styleTag = document.createElement('style');
      styleTag.id = styleId;
      document.head.appendChild(styleTag);
    }

    styleTag.innerHTML = `
      @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;700&display=swap');

      body {
        font-family: 'Crimson Pro', serif !important;
        background-image: 
            linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px),
            linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px);
        background-size: 25px 25px; /* Textura de caderno/grade leve */
      }

      header {
        background: #ffffff !important;
        border-bottom: 3px solid #000000 !important;
        backdrop-filter: none !important;
        padding: 40px 16px !important;
      }

      h1 {
        font-weight: 700;
        letter-spacing: -1px;
        color: #000;
      }

      /* Estilo dos Cards - Sketch com Bordas Coloridas */
      .about, .card {
        border-radius: 2px !important;
        box-shadow: 6px 6px 0px rgba(0,0,0,0.1) !important; /* Sombra sólida de desenho */
        transition: all 0.2s ease;
        background: #fff !important;
      }

      /* Cores de Suporte solicitadas (Azul, Amarelo, Vermelho) */
      .card--suporte-sim {
        border: 4px solid #2b6cb0 !important; /* Azul Sólido */
      }

      .card--suporte-nao {
        border: 4px solid #c53030 !important; /* Vermelho Sólido */
      }

      .card--suporte-em-breve {
        border: 4px solid #d69e2e !important; /* Amarelo/Dourado Sólido */
      }

      .about {
        border: 2px solid #000 !important;
      }

      .about h2, .card h2 {
        text-transform: uppercase;
        font-size: 1.1rem;
        border-bottom: 1px solid #eee;
        padding-bottom: 5px;
      }

      /* Botões em estilo bloco de desenho */
      .project-link {
        background: #000 !important;
        color: #fff !important;
        border-radius: 0px !important;
        border: 2px solid #000 !important;
        padding: 6px 15px !important;
      }

      .video-link {
        background: #fff !important;
        color: #000 !important;
        border: 2px solid #000 !important;
        border-radius: 0px !important;
      }

      .video-link:hover {
        background: #000 !important;
        color: #fff !important;
      }

      /* Ajuste do Chat */
      .chat-widget {
        border: 2px solid #000 !important;
        border-radius: 0px !important;
        box-shadow: 4px 4px 0px #000 !important;
      }

      .chat-toggle {
        background: #000 !important;
        border-radius: 0px !important;
      }
    `;

    console.log("Modo Kindle Color ativado com sucesso.");
  })();
</script>
